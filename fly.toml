# fly.toml file para deploy no Fly.io
app = "gestor-da-loja" # SUBSTITUA pelo nome exato do seu app criado no Fly.io (use apenas letras minúsculas, números e hífens)

primary_region = "gru" # Configurado para São Paulo (Brasil) por padrão

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
