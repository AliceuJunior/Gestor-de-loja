<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor da Loja</title>
    
    <!-- Fontes do Google: Inter para a interface geral, JetBrains Mono para valores numéricos, Space Grotesk para títulos -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- Estilos do Sistema -->
    <link rel="stylesheet" href="/assets/css/variables.css" />
    <link rel="stylesheet" href="/assets/css/global.css" />
    <link rel="stylesheet" href="/assets/css/components.css" />
    <link rel="stylesheet" href="/assets/css/pages.css" />
  </head>
  <body>
    <!-- Container Principal do Aplicativo (Layout SPA) -->
    <div id="app" class="app-container">
      
      <!-- Cabeçalho (Header) do Sistema -->
      <header class="app-header">
        <div style="display: flex; align-items: center;">
          <!-- Botão Hamburger para Abrir Sidebar Drawer -->
          <button id="btn-sidebar-toggle" class="icon-button" aria-label="Menu" style="margin-right: var(--spacing-sm); display: flex; align-items: center; justify-content: center; background: none; border: none; color: var(--text-primary); cursor: pointer; padding: var(--spacing-xs);">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <div class="header-info">
            <h1 class="header-brand">Gestor da Loja</h1>
            <p class="header-welcome">Olá, <span id="user-name-display" class="font-highlight">Assistência Central</span></p>
          </div>
        </div>
        <div class="header-actions">
          <!-- Botão de Atalho para Configurações -->
          <button id="btn-header-settings" class="icon-button" aria-label="Ajustes">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
          <!-- Botão de Logout para Sair da Sessão (Ocultado temporariamente) -->
          <button id="btn-header-logout" class="icon-button" aria-label="Sair" onclick="realizarLogout()" style="margin-left: var(--spacing-xs); color: #ef4444; display: none;" title="Sair da Conta">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Conteúdo Principal Dinâmico (Main) - Onde as telas do SPA serão injetadas -->
      <main id="main-content" class="app-main">
        <!-- O conteúdo será injetado dinamicamente via JS na Etapa 9 -->
        <div class="loading-placeholder">Carregando o sistema...</div>
      </main>

      <!-- Barra de Navegação Inferior Flutuante (Bottom Navigation) -->
      <nav class="bottom-nav">
        <button id="nav-dashboard" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"></path>
          </svg>
          <span class="nav-label">Painel</span>
        </button>
        
        <button id="nav-manutencoes" class="nav-item" data-page="manutencoes">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
          </svg>
          <span class="nav-label">Serviços</span>
        </button>

        <!-- Aba de Pedidos e Compras -->
        <button id="nav-pedidos" class="nav-item" data-page="pedidos">
          <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="nav-label">Pedidos</span>
        </button>

        <!-- Botão de Ação Rápida Central (+) -->
        <div class="quick-action-container">
          <button id="btn-quick-add" class="quick-action-button" aria-label="Adicionar Novo">
            <svg class="quick-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
            </svg>
          </button>
        </div>

        <!-- Mural de Avisos -->
        <button id="nav-avisos" class="nav-item" data-page="avisos">
          <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          <span class="nav-label">Mural</span>
        </button>

        <button id="nav-despesas" class="nav-item" data-page="despesas">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span class="nav-label">Despesas</span>
        </button>

        <button id="nav-retiradas" class="nav-item" data-page="retiradas">
          <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          <span class="nav-label font-light">Sócios</span>
        </button>
      </nav>

      <!-- Sidebar Drawer Lateral -->
      <div id="app-sidebar" class="sidebar-drawer">
        <div class="sidebar-header">
          <div class="sidebar-brand">Menu de Utilidades</div>
          <button id="btn-sidebar-close" class="icon-button" aria-label="Fechar Menu" style="color: var(--text-muted); background: none; border: none; cursor: pointer;">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="sidebar-content">
          <nav class="sidebar-nav">
            <button class="sidebar-nav-item active" data-page="dashboard">
              <span class="sidebar-icon">📊</span>
              <span class="sidebar-label">Painel de Controle</span>
            </button>
            <button class="sidebar-nav-item" data-page="manutencoes">
              <span class="sidebar-icon">🔧</span>
              <span class="sidebar-label">Controle de Serviços</span>
            </button>
            <button class="sidebar-nav-item" data-page="pedidos">
              <span class="sidebar-icon">📦</span>
              <span class="sidebar-label">Pedidos de Compra</span>
            </button>
            <button class="sidebar-nav-item" data-page="avisos">
              <span class="sidebar-icon">📌</span>
              <span class="sidebar-label">Mural de Avisos</span>
            </button>
            <button class="sidebar-nav-item" data-page="vendas">
              <span class="sidebar-icon">🛍️</span>
              <span class="sidebar-label">Lançar Vendas</span>
            </button>
            <button class="sidebar-nav-item" data-page="despesas">
              <span class="sidebar-icon">📉</span>
              <span class="sidebar-label">Controle de Despesas</span>
            </button>
            <button class="sidebar-nav-item" data-page="retiradas">
              <span class="sidebar-icon">💸</span>
              <span class="sidebar-label">Área dos Sócios</span>
            </button>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin: var(--spacing-sm) 0; opacity: 0.15;" />
            <button class="sidebar-nav-item" data-page="ajustes">
              <span class="sidebar-icon">⚙️</span>
              <span class="sidebar-label">Configurações</span>
            </button>
          </nav>
        </div>
      </div>
      <!-- Backdrop Overlay -->
      <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

    </div>

    <!-- Script de Inicialização da Aplicação SPA -->
    <script type="module" src="/assets/js/app.ts"></script>
  </body>
</html>
